<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💬 Chat Familiar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .chat-container {
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            display: flex;
            overflow: hidden;
            position: relative;
        }
        
        /* Modal de registro */
        .register-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        
        .register-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeInUp 0.3s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .register-card h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        
        .register-card p {
            color: #718096;
            margin-bottom: 20px;
        }
        
        .register-card input {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .register-card input:focus {
            border-color: #667eea;
        }
        
        .register-card button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .register-card button:hover {
            background: #5a67d8;
        }
        
        .register-card button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .sidebar {
            width: 250px;
            background: #2d3748;
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 20px;
            background: #1a202c;
            border-bottom: 1px solid #4a5568;
        }
        
        .sidebar-header h3 {
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #4a5568;
            border-radius: 10px;
            margin-top: 10px;
        }
        
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        
        .user-name {
            flex: 1;
            font-size: 0.9em;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            margin-bottom: 8px;
            background: #4a5568;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .user-item:hover {
            background: #5a6578;
        }
        
        .user-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #48bb78;
            margin-left: auto;
        }
        
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f7fafc;
        }
        
        .chat-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #2d3748;
        }
        
        .connection-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .connected {
            background: #48bb78;
            color: white;
        }
        
        .connecting {
            background: #ed8936;
            color: white;
        }
        
        .disconnected {
            background: #f56565;
            color: white;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            display: flex;
            animation: slideIn 0.2s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.sent {
            justify-content: flex-end;
        }
        
        .message.received {
            justify-content: flex-start;
        }
        
        .message.system {
            justify-content: center;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }
        
        .message.sent .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.received .message-bubble {
            background: white;
            border: 1px solid #e2e8f0;
            color: #2d3748;
            border-bottom-left-radius: 4px;
        }
        
        .message.system .message-bubble {
            background: #edf2f7;
            color: #4a5568;
            font-size: 0.85em;
            font-style: italic;
            max-width: 90%;
        }
        
        .message-name {
            font-size: 0.75em;
            margin-bottom: 4px;
            font-weight: bold;
        }
        
        .message-time {
            font-size: 0.65em;
            margin-top: 4px;
            opacity: 0.7;
        }
        
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .chat-input-area input:focus {
            border-color: #667eea;
        }
        
        .chat-input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s;
        }
        
        .chat-input-area button:hover:not(:disabled) {
            background: #5a67d8;
        }
        
        .chat-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .message-bubble {
                max-width: 85%;
            }
            
            .chat-input-area button {
                padding: 12px 18px;
            }
        }
        
        .emoji-btn {
            background: #edf2f7;
            border: none;
            border-radius: 25px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 1.2em;
        }
        
        .emoji-panel {
            position: absolute;
            bottom: 80px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        
        .emoji-panel button {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.1s;
        }
        
        .emoji-panel button:hover {
            transform: scale(1.2);
        }
        
        .error-message {
            color: #f56565;
            font-size: 0.85em;
            margin-top: 10px;
            display: none;
        }
        
        .status-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2d3748;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10000;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Modal de registro -->
        <div class="register-modal" id="registerModal">
            <div class="register-card">
                <h2>💬 Chat Familiar</h2>
                <p>¡Bienvenido! Ingresa tu nombre para comenzar</p>
                <input type="text" id="nombreInput" placeholder="Tu nombre" autocomplete="off" maxlength="20">
                <button id="registrarBtn">✨ Unirse al chat</button>
                <div id="errorMsg" class="error-message"></div>
            </div>
        </div>
        
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>👥 Participantes</h3>
                <div class="user-info" id="myUserInfo">
                    <div class="user-avatar" id="myAvatar">?</div>
                    <div class="user-name" id="myName">Sin conectar</div>
                </div>
            </div>
            <div class="users-list" id="usersList">
                <div style="text-align: center; padding: 20px;">Esperando conexión...</div>
            </div>
        </div>
        
        <div class="main-chat">
            <div class="chat-header">
                <div class="chat-title">💬 Chat Familiar</div>
                <div id="connectionStatus" class="connection-status connecting">🔄 Conectando...</div>
            </div>
            
            <div id="messages" class="chat-messages">
                <div class="message system">
                    <div class="message-bubble">
                        💡 Conectando al servidor...
                    </div>
                </div>
            </div>
            
            <div class="chat-input-area">
                <button class="emoji-btn" id="emojiBtn">😊</button>
                <input type="text" id="messageInput" placeholder="Escribe tu mensaje..." disabled>
                <button id="sendButton" disabled>📤 Enviar</button>
            </div>
        </div>
    </div>
    
    <div id="emojiPanel" class="emoji-panel" style="display: none;">
        <button>😊</button><button>😂</button><button>❤️</button><button>👍</button><button>😢</button><button>🎉</button>
        <button>✨</button><button>🌟</button><button>💕</button><button>🐶</button><button>🐱</button><button>🍕</button>
        <button>🎨</button><button>📚</button><button>🏃</button><button>🎵</button><button>💤</button><button>🌈</button>
    </div>
    
    <div class="status-message" id="statusMessage">Inicializando...</div>

    <script>
        // Configuración
        const VPS_IP = '72.61.50.227'; // Cambia por la IP de tu VPS
        const WS_PORT = 8123;
        
        // Estado global
        let ws = null;
        let miNombre = null;
        let registrado = false;
        let reconnectAttempts = 0;
        let nombreEnviado = false;
        
        // DOM elements
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusDiv = document.getElementById('connectionStatus');
        const usersListDiv = document.getElementById('usersList');
        const myAvatar = document.getElementById('myAvatar');
        const myName = document.getElementById('myName');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPanel = document.getElementById('emojiPanel');
        const registerModal = document.getElementById('registerModal');
        const nombreInput = document.getElementById('nombreInput');
        const registrarBtn = document.getElementById('registrarBtn');
        const errorMsg = document.getElementById('errorMsg');
        const statusMessage = document.getElementById('statusMessage');
        
        function updateStatus(msg, isError = false) {
            statusMessage.textContent = msg;
            statusMessage.style.background = isError ? '#f56565' : '#2d3748';
            console.log(`[STATUS] ${msg}`);
            setTimeout(() => {
                if (statusMessage.textContent === msg) {
                    statusMessage.textContent = 'Chat listo';
                    statusMessage.style.background = '#2d3748';
                }
            }, 3000);
        }
        
        // Conectar WebSocket (solo UNA vez)
        function connect() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                console.log('WebSocket ya está conectado o conectándose');
                return;
            }
            
            const wsUrl = `ws://${VPS_IP}:${WS_PORT}`;
            updateStatus(`Conectando a ${wsUrl}...`);
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('✅ WebSocket conectado');
                updateStatus('✅ Conectado al servidor');
                statusDiv.textContent = '✅ Conectado';
                statusDiv.className = 'connection-status connected';
                reconnectAttempts = 0;
                
                // Mostrar modal si no estamos registrados
                if (!registrado && !miNombre) {
                    console.log('Mostrando modal de registro');
                    registerModal.style.display = 'flex';
                    updateStatus('Por favor, ingresa tu nombre');
                } else if (miNombre && !registrado && !nombreEnviado) {
                    console.log(`Reenviando registro para: ${miNombre}`);
                    enviarRegistro();
                }
            };
            
            ws.onmessage = (event) => {
                console.log(`📨 Mensaje recibido: ${event.data.substring(0, 100)}`);
                try {
                    const data = JSON.parse(event.data);
                    procesarMensaje(data);
                } catch (error) {
                    console.error('Error parsing mensaje:', error);
                }
            };
            
            ws.onerror = (error) => {
                console.error('❌ Error de WebSocket:', error);
                updateStatus('Error de conexión', true);
                statusDiv.textContent = '❌ Error';
                statusDiv.className = 'connection-status disconnected';
            };
            
            ws.onclose = () => {
                console.log('🔌 WebSocket cerrado');
                updateStatus('Desconectado, reconectando...', true);
                statusDiv.textContent = '🔌 Desconectado';
                statusDiv.className = 'connection-status disconnected';
                registrado = false;
                messageInput.disabled = true;
                sendButton.disabled = true;
                
                // Intentar reconectar después de 3 segundos
                setTimeout(() => {
                    if (!ws || ws.readyState === WebSocket.CLOSED) {
                        console.log('Intentando reconectar...');
                        connect();
                    }
                }, 3000);
            };
        }
        
        function enviarRegistro() {
            if (!miNombre) {
                console.error('No hay nombre para registrar');
                return;
            }
            
            if (ws && ws.readyState === WebSocket.OPEN && !registrado && !nombreEnviado) {
                nombreEnviado = true;
                const registroMsg = {
                    tipo: 'registro',
                    nombre: miNombre,
                    tipo_cliente: 'web'
                };
                console.log(`📤 Enviando registro: ${JSON.stringify(registroMsg)}`);
                updateStatus(`Registrando a ${miNombre}...`);
                ws.send(JSON.stringify(registroMsg));
            } else {
                console.log(`No se puede registrar: ws=${!!ws}, readyState=${ws?.readyState}, registrado=${registrado}, nombreEnviado=${nombreEnviado}`);
            }
        }
        
        function procesarMensaje(data) {
            switch(data.tipo) {
                // En la función procesarMensaje, modifica el case 'sistema':
            case 'sistema':
                console.log(`💬 Sistema: ${data.mensaje}`);
                mostrarMensajeSistema(data.mensaje);
                
                if (data.mensaje && (data.mensaje.includes('Bienvenid') || data.mensaje.includes('vuelta'))) {
                    console.log('✅ Registro exitoso!');
                    registrado = true;
                    nombreEnviado = false;
                    registerModal.style.display = 'none';
                    messageInput.disabled = false;
                    sendButton.disabled = false;
                    messageInput.focus();
                    updateStatus(`✅ ${data.mensaje}`);
                    
                    if (data.usuario) {
                        const miColor = data.usuario.color;
                        myAvatar.textContent = miNombre.charAt(0).toUpperCase();
                        myAvatar.style.backgroundColor = miColor;
                        myName.textContent = miNombre;
                        
                        if (!data.usuario.esNuevo) {
                            mostrarMensajeSistema(`💫 ¡Hola de nuevo ${miNombre}! Tus mensajes anteriores están aquí.`);
                        }
                    }
                }
                break;
                    
                case 'mensaje':
                    mostrarMensaje(data.de, data.texto, data.timestamp, data.color);
                    break;
                    
                case 'historial':
                    console.log(`📜 Historial: ${data.mensajes?.length || 0} mensajes`);
                    mostrarHistorial(data.mensajes);
                    break;
                    
                case 'usuarios':
                    console.log(`👥 ${data.lista?.length || 0} usuarios activos`);
                    actualizarListaUsuarios(data.lista);
                    break;
                    
                case 'error':
                    console.log(`⚠️ Error: ${data.mensaje}`);
                    mostrarMensajeSistema(`⚠️ Error: ${data.mensaje}`);
                    errorMsg.textContent = data.mensaje;
                    errorMsg.style.display = 'block';
                    nombreEnviado = false;
                    setTimeout(() => {
                        errorMsg.style.display = 'none';
                    }, 3000);
                    break;
            }
        }
        
        function mostrarMensajeSistema(texto) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message system';
            messageDiv.innerHTML = `<div class="message-bubble">${texto}</div>`;
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }
        
        function mostrarMensaje(nombre, texto, timestamp, color = '#667eea') {
            const esMiMensaje = nombre === miNombre;
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${esMiMensaje ? 'sent' : 'received'}`;
            
            const hora = timestamp ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                ${!esMiMensaje ? `<div class="message-name" style="color: ${color}">${nombre}</div>` : ''}
                <div class="message-bubble" style="${!esMiMensaje ? `border-left: 3px solid ${color};` : ''}">
                    ${texto}
                    <div class="message-time">${hora}</div>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }
        
        function mostrarHistorial(mensajes) {
            if (mensajes && mensajes.length > 0) {
                messagesDiv.innerHTML = '<div class="message system"><div class="message-bubble">📜 Mensajes recientes</div></div>';
                mensajes.forEach(msg => {
                    mostrarMensaje(msg.de, msg.texto, msg.timestamp, msg.color_asignado);
                });
                mostrarMensajeSistema('💬 ¡Chat iniciado!');
            } else {
                messagesDiv.innerHTML = '<div class="message system"><div class="message-bubble">💬 ¡Nuevo chat familiar! Envía tu primer mensaje ✨</div></div>';
            }
            scrollToBottom();
        }
        
        function actualizarListaUsuarios(usuarios) {
            if (!usuarios || usuarios.length === 0) {
                usersListDiv.innerHTML = '<div style="text-align: center; padding: 20px;">No hay usuarios activos</div>';
                return;
            }
            
            const yo = usuarios.find(u => u.nombre === miNombre);
            if (yo) {
                myAvatar.textContent = miNombre.charAt(0).toUpperCase();
                myAvatar.style.backgroundColor = yo.color_asignado;
                myName.textContent = miNombre;
            }
            
            usersListDiv.innerHTML = usuarios.map(u => `
                <div class="user-item">
                    <div class="user-avatar" style="background: ${u.color_asignado}; width: 30px; height: 30px; font-size: 0.8em;">
                        ${u.nombre.charAt(0).toUpperCase()}
                    </div>
                    <div class="user-name" style="flex: 1;">${u.nombre}${u.nombre === miNombre ? ' (tú)' : ''}</div>
                    <div class="user-status" title="${u.tipo_cliente === 'flutter' ? 'App móvil' : 'Web'}"></div>
                </div>
            `).join('');
        }
        
        function enviarMensaje() {
            const texto = messageInput.value.trim();
            if (texto && ws && ws.readyState === WebSocket.OPEN && registrado) {
                console.log(`📤 Enviando mensaje: "${texto.substring(0, 30)}"`);
                ws.send(JSON.stringify({
                    tipo: 'mensaje',
                    texto: texto
                }));
                messageInput.value = '';
                messageInput.focus();
            } else if (!registrado) {
                updateStatus('Esperando registro...', true);
                mostrarMensajeSistema('⏳ Esperando registro...');
            }
        }
        
        function scrollToBottom() {
            setTimeout(() => {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }, 50);
        }
        
        // Eventos del modal de registro
        registrarBtn.addEventListener('click', () => {
            const nombre = nombreInput.value.trim();
            if (nombre === '') {
                errorMsg.textContent = 'Por favor ingresa un nombre';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (nombre.length < 2) {
                errorMsg.textContent = 'El nombre debe tener al menos 2 caracteres';
                errorMsg.style.display = 'block';
                return;
            }
            
            miNombre = nombre;
            nombreEnviado = false;
            console.log(`📝 Nombre ingresado: ${miNombre}`);
            registerModal.style.display = 'none';
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                enviarRegistro();
            } else {
                updateStatus('Conectando al servidor...');
                connect();
                // Esperar a que se conecte para enviar el registro
                const checkConnection = setInterval(() => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        clearInterval(checkConnection);
                        enviarRegistro();
                    }
                }, 100);
            }
        });
        
        nombreInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                registrarBtn.click();
            }
        });
        
        // Emoji panel
        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isVisible = emojiPanel.style.display === 'flex';
            emojiPanel.style.display = isVisible ? 'none' : 'flex';
        });
        
        document.querySelectorAll('.emoji-panel button').forEach(btn => {
            btn.addEventListener('click', () => {
                messageInput.value += btn.textContent;
                messageInput.focus();
                emojiPanel.style.display = 'none';
            });
        });
        
        document.addEventListener('click', (e) => {
            if (!emojiBtn.contains(e.target) && !emojiPanel.contains(e.target)) {
                emojiPanel.style.display = 'none';
            }
        });
        
        sendButton.addEventListener('click', enviarMensaje);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensaje();
            }
        });
        
        // Ping cada 30 segundos para mantener la conexión viva
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN && registrado) {
                ws.send(JSON.stringify({ tipo: 'ping' }));
                console.log('🏓 Ping enviado');
            }
        }, 30000);
        
        // Iniciar conexión
        console.log('🚀 Iniciando cliente...');
        connect();
    </script>
</body>
</html>
